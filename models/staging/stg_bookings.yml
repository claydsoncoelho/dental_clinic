version: 2

models:
  - name: stg_bookings
    description: "Bookings of the patiants for specific service and professional."
    columns:
      - name: booking_id
        description: "Booking unique ID"
        data_tests:
          - not_null
          - unique

      - name: client_id
        description: "Client ID of the booking."

      - name: service_id
        description: "Service booked by the client."

      - name: booking_date
        description: ""
        data_type: date

      - name: booking_time
        description: ""
        data_type: time

      - name: dentist_id
        description: ""

      - name: metadata_filename
        description: ""

      - name: metadata_file_row_number
        description: ""

      - name: metadata_file_last_modified
        description: ""